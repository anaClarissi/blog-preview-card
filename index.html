<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <link rel="stylesheet" href="assets/css/style.css">

</head>
<body>
  <main>

    <section>

      <article class="card">

        <img src="assets/images/illustration-article.svg" alt="" id="blog-img">

        <div class="blog-content">

          <span class="learning">Learning</span>

          <p>Published 21 Dec 2023</p>

          <h1 class="blog-title">HTML & CSS foundations</h1>

          <p class="blog-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>

        </div>

        <figure class="avatar">

          <img src="assets/images/avatar-img.png" alt="" class="avatar-img">

          <figcaption class="avatar-fig">Ana Clarissi</figcaption>

        </figure>

      </article>

    </section>

  </main>

  <script src="assets/js/script.js"></script>
  
</body>
</html>
